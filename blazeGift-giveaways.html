<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlazeGift.up — Розыгрыши</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none;
        }

        html, body {
            height: 100%;
            width: 100%;
            position: fixed;
            background-color: #0a0a0a;
            font-family: "Poppins", sans-serif;
            overflow: hidden;
        }

        button, a {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            -webkit-appearance: none;
            appearance: none;
        }

        button:focus, button:active, button:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }


        /* ── TOP BAR ── */
        .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    background: #0a0a0a;
    padding-top: 80px;
        }
            

        /* ── КНОПКА ПОПОЛНИТЬ ── */
        .deposit-btn {
            background: #cb8a19;
            border: none;
            border-radius: 50px;
            padding: 12px 38px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
            outline: none;
        }

        .deposit-btn:active {
            background: #a57015;
            transform: scale(0.96);
        }

        /* ── БАЛАНС ── */
        .balance-chip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: #1c1c1c;
            border-radius: 50px;
            padding: 10px 14px;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            margin-left: auto;
            flex: 0 0 auto;
        }

        .balance-chip span {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .ton-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ── АВАТАРКА ── */
        .avatar-wrap {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 2px solid rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }

        .avatar-wrap:active {
            transform: scale(0.92);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-placeholder i {
            font-size: 20px;
            color: #888;
        }

        .avatar-initials {
            font-size: 16px;
            font-weight: 700;
            color: #aaa;
            font-family: "Poppins", sans-serif;
        }

        button, a {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            -webkit-appearance: none;
            appearance: none;
        }

        button:focus, button:active, button:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }

        .page-content {
    padding-top: 0;
    padding-bottom: 110px;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
        }



        /* ── TABS ── */
        .tabs-wrap { padding: 14px 12px 0; }

        .tabs-container {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 4px;
            display: flex;
            border: 1.5px solid rgba(255,255,255,0.12);
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            font-family: "Poppins", sans-serif;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none;
        }
        .tab-btn.active { background: #2c2c2e; color: #fff; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: #cb8a19;
            border-radius: 2px;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        /* ── HERO BANNER ── */
        .giveaway-hero {
            margin: 16px 12px 0;
            background: #141414;
            border-radius: 18px;
            border: 1.5px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            gap: 12px;
            overflow: hidden;
        }

        .giveaway-hero-text {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .giveaway-hero-title {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
        }
        .giveaway-hero-title span { color: #dd9417; }

        .giveaway-hero-sub {
            color: #888;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.5;
        }

        .giveaway-hero-img {
            width: 110px;
            height: 110px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .giveaway-hero-img svg, .giveaway-hero-img img { width: 100%; height: 100%; }

        /* ── SECTION LABEL ── */
        .section-label {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            padding: 20px 12px 10px;
        }

        /* ── GIVEAWAY LIST ── */
        .giveaway-list {
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .giveaway-card {
            background: #141414;
            border-radius: 18px;
            border: 1.5px solid rgba(255,255,255,0.08);
            padding: 18px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .giveaway-card-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .giveaway-timer {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1c1c1e;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 5px 10px;
            color: #ccc;
            font-size: 12px;
            font-weight: 600;
            width: fit-content;
        }
        .giveaway-timer i { font-size: 13px; color: #888; }

        .giveaway-name {
            color: #fff;
            font-size: 17px;
            font-weight: 700;
        }

        .giveaway-tickets-total {
            color: #777;
            font-size: 12px;
            font-weight: 500;
        }

        .giveaway-progress-track {
            width: 100%;
            height: 5px;
            background: #262626;
            border-radius: 4px;
            overflow: hidden;
        }
        .giveaway-progress-fill {
            height: 100%;
            background: #e0930f;
            border-radius: 4px;
        }

        .giveaway-tickets-current {
            color: #888;
            font-size: 12px;
            font-weight: 500;
        }

        .giveaway-join-btn {
            background: #cb8a19;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 11px 0;
            font-size: 14px;
            font-family: "Poppins", sans-serif;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 2px;
            transition: background 0.2s, transform 0.1s;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none;
        }
        .giveaway-join-btn:active { background: #a97316; transform: scale(0.97); }

        .giveaway-card-img {
            width: 125px;
            height: 125px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .giveaway-card-img svg, .giveaway-card-img img { width: 100%; height: 100%; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 60px 20px;
            color: #6e4b0a;
        }
        .empty-state i { font-size: 42px; }
        .empty-state p { font-size: 14px; font-weight: 500; }

        /* ── NAV BAR ── */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #141414;
            border-top: 0.5px solid #242424;
            border-radius: 20px 20px 0 0;
            padding: 8px 0 max(28px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            flex: 1;
            padding: 4px 0;
            transition: transform 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent !important;
            border: none;
            background: none;
            outline: none !important;
        }
        .nav-item:active { transform: scale(0.88); }

        .icon-wrap {
            width: 40px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: background 0.2s;
            position: relative;
        }

        .nav-item i { font-size: 23px; color: #4a4a4a; transition: color 0.2s; }
        .nav-item span {
            font-size: 10px;
            color: #4a4a4a;
            font-weight: 400;
            font-family: "Poppins", sans-serif;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-item.active .icon-wrap { background: rgba(255,160,0,0.13); }
        .nav-item.active i,
        .nav-item.active span { color: #ffa000; }
        .nav-item.active span { font-weight: 600; }

        .nav-item.active .icon-wrap::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 3px;
            background: #ffa000;
            border-radius: 0 0 4px 4px;
        }

        .badge {
            position: absolute;
            top: 1px;
            right: 1px;
            width: 8px;
            height: 8px;
            background: #e53935;
            border-radius: 50%;
            border: 1.5px solid #141414;
        }
    </style>
</head>
<body>

<div class="page-content">

    <!-- TOP BAR -->
    <div class="topbar">
    <button class="deposit-btn">Пополнить</button>

    <div class="balance-chip">
        <svg class="ton-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="28" cy="28" r="28" fill="#0098EA"/>
            <path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/>
        </svg>
        <span id="balance-amount">0.00</span>
    </div>

    <div class="avatar-wrap" id="user-icon" onclick="window.location.href='index.html'">
        <div class="avatar-placeholder"><i class="ti ti-user"></i></div>
    </div>
  </div>

    <!-- TABS -->
    <div class="tabs-wrap">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('active')">Активные</button>
            <button class="tab-btn" onclick="switchTab('finished')">Завершённые</button>
        </div>
    </div>

    <!-- ACTIVE PANEL -->
    <div id="tab-active" class="panel active">

        <!-- Hero banner -->
        <div class="giveaway-hero">
            <div class="giveaway-hero-text">
                <div class="giveaway-hero-title">Участвуй в<br><span>РОЗЫГРЫШАХ</span></div>
                <div class="giveaway-hero-sub">И выигрывай ценные<br>призы!</div>
            </div>
            <div class="giveaway-hero-img">
                <img src="https://cdn.changes.tg/gifts/originals/5168043875654172773/Original.png" alt="pepe-Frozen">
            </div>
        </div>

        <div class="section-label">Активные розыгрыши</div>

        <div class="giveaway-list">

            <div class="giveaway-card">
                <div class="giveaway-card-left">
                    <div class="giveaway-timer"><i class="ti ti-clock"></i> <span class="timer-val" data-end="1000">00:16:36</span></div>
                    <div class="giveaway-name">Plush Pepe Frozen</div>
                    <div class="giveaway-tickets-total">Всего билетов: 5000</div>
                    <div class="giveaway-progress-track">
                        <div class="giveaway-progress-fill" style="width:25%;"></div>
                    </div>
                    <div class="giveaway-tickets-current">1250 / 5000 билетов</div>
                    <button class="giveaway-join-btn" onclick="joinGiveaway(this)">Участвовать</button>
                </div>
                <div class="giveaway-card-img">
                    <img src="https://cdn.changes.tg/gifts/models/Plush%20Pepe/png/Frozen.png" alt="pepe-Frozen">
                </div>
            </div>

            <div class="giveaway-card">
                <div class="giveaway-card-left">
                    <div class="giveaway-timer"><i class="ti ti-clock"></i> <span class="timer-val" data-end="1542">00:25:42</span></div>
                    <div class="giveaway-name">Ginie Lamp Ice</div>
                    <div class="giveaway-tickets-total">Всего билетов: 100</div>
                    <div class="giveaway-progress-track">
                        <div class="giveaway-progress-fill" style="width:45%;"></div>
                    </div>
                    <div class="giveaway-tickets-current">45 / 100 билетов</div>
                    <button class="giveaway-join-btn" onclick="joinGiveaway(this)">Участвовать</button>
                </div>
                <div class="giveaway-card-img">
                    <img src="https://cdn.changes.tg/gifts/models/Genie%20Lamp/png/Arctic%20Winds.png" alt="pepe-Frozen">
                </div>
            </div>

        </div>
    </div>

    <!-- FINISHED PANEL -->
    <div id="tab-finished" class="panel">
        <div class="empty-state">
            <i class="ti ti-history"></i>
            <p>Завершённых розыгрышей пока нет</p>
        </div>
    </div>

</div>

<!-- NAV BAR -->
<nav class="nav-bar" role="navigation">
    <button class="nav-item active" data-page="blazeGift-giveaways.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-gift"></i><span class="badge"></span></div>
        <span>Розыгрыши</span>
    </button>
    <button class="nav-item" data-page="blazeGift-earn.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-coin"></i></div>
        <span>Заработать</span>
    </button>
    <button class="nav-item" data-page="blazeGift-games.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-home"></i></div>
        <span>Игры</span>
    </button>
    <button class="nav-item" data-page="blazeGift-leaderboard.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-trophy"></i></div>
        <span>Лидерборд</span>
    </button>
    <button class="nav-item" data-page="blazeGift-profile.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-user"></i></div>
        <span>Профиль</span>
    </button>
</nav>

<script>
// ── ПОЛЬЗОВАТЕЛЬ ──
const tg = window.Telegram?.WebApp;

if (tg) {
    tg.ready();
    tg.expand();
    if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
    if (tg.setHeaderColor) tg.setHeaderColor('#0a0a0a');
    if (tg.setBackgroundColor) tg.setBackgroundColor('#0a0a0a');
    if (tg.setBottomBarColor) tg.setBottomBarColor('#0a0a0a');
}

const tgUser = tg?.initDataUnsafe?.user;
const iconEl = document.getElementById('user-icon');

if (tgUser?.photo_url) {
    iconEl.innerHTML = `<img src="${tgUser.photo_url}" alt="avatar">`;
}

// ── TABS ──
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'active') || (i === 1 && tab === 'finished'));
    });
    document.getElementById('tab-active').classList.toggle('active', tab === 'active');
    document.getElementById('tab-finished').classList.toggle('active', tab === 'finished');
}

// ── ТАЙМЕРЫ ──
function formatTime(s) {
    const h = String(Math.floor(s / 3600)).padStart(2, '0');
    const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return `${h}:${m}:${sec}`;
}

document.querySelectorAll('.timer-val').forEach(el => {
    let remaining = parseInt(el.dataset.end, 10);
    el.textContent = formatTime(remaining);
    setInterval(() => {
        if (remaining > 0) {
            remaining--;
            el.textContent = formatTime(remaining);
        }
    }, 1000);
});

// ── УЧАСТИЕ В РОЗЫГРЫШЕ ──
function joinGiveaway(btn) {
    btn.textContent = 'Вы участвуете ✓';
    btn.disabled = true;
    btn.style.background = '#1e1e1e';
    btn.style.color = '#888';
}

// ── НАВИГАЦИЯ ──
function navigate(button) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    button.classList.add('active');
    window.location.href = button.dataset.page;
}
</script>

</body>
</html>
