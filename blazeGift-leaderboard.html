<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlazeGift.up — Лидерборд</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none;
        }

        html, body {
            height: 100%;
            background-color: #0a0a0a;
            font-family: "Poppins", sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        button, a {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            -webkit-appearance: none;
            appearance: none;
        }

        button:focus, button:active, button:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }

        /* ── TOPBAR — FIXED ── */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            padding-top: 80px;
            background: #0a0a0a;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* compensate for fixed topbar */
        .topbar-spacer {
            height: calc(80px + 52px + 14px);
        }

        .deposit-btn {
            background: #cb8a19;
            border: none;
            border-radius: 50px;
            padding: 12px 38px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
            outline: none;
        }

        .deposit-btn:active {
            background: #a57015;
            transform: scale(0.96);
        }

        .balance-chip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: #1c1c1c;
            border-radius: 50px;
            padding: 10px 14px;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            margin-left: auto;
            flex: 0 0 auto;
        }

        .balance-chip span {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .ton-icon { width: 20px; height: 20px; flex-shrink: 0; }
        .ton-icon-sm { width: 16px; height: 16px; flex-shrink: 0; }

        .avatar-wrap {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 2px solid rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }

        .avatar-wrap:active {
            transform: scale(0.92);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar-placeholder i { font-size: 20px; color: #888; }

        .avatar-initials {
            font-size: 16px;
            font-weight: 700;
            color: #aaa;
            font-family: "Poppins", sans-serif;
        }

        /* ── PAGE ── */
        .page-content {
            padding-top: 0;
            padding-bottom: 110px;
            width: 100%;
        }

        /* ── HERO HEADER ── */
        .lb-hero {
            margin: 14px 12px 0;
            background: #141414;
            border-radius: 18px;
            border: 1.5px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            gap: 12px;
            overflow: hidden;
        }

        .lb-hero-text {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .lb-hero-title {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
        }

        .lb-hero-sub {
            color: #888;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.5;
        }

        .lb-trophy-wrap {
            width: 110px;
            height: 110px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-trophy-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ── TABS ── */
        .tabs-wrap { padding: 16px 12px 0; }

        .tabs-container {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 4px;
            display: flex;
            border: 1.5px solid rgba(255,255,255,0.12);
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            font-family: "Poppins", sans-serif;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none;
        }

        .tab-btn.active { background: #2c2c2e; color: #fff; }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: #cb8a19;
            border-radius: 2px;
        }

        /* ── LEADERBOARD LIST ── */
        .lb-list {
            padding: 14px 12px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lb-row {
            background: #141414;
            border-radius: 16px;
            border: 1.5px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            padding: 12px 14px;
            gap: 12px;
            transition: transform 0.1s;
        }

        .lb-row:active { transform: scale(0.98); }

        .lb-row.rank-1 { border-color: #cb8a19; background: rgba(203,138,25,0.07); }
        .lb-row.rank-2 { border-color: rgba(180,180,180,0.4); background: rgba(180,180,180,0.04); }
        .lb-row.rank-3 { border-color: rgba(160,100,40,0.6); background: rgba(160,100,40,0.06); }

        /* rank wrap: number on top, trophy icon below */
        .lb-rank-wrap {
            width: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            flex-shrink: 0;
        }

        .lb-rank-num {
            font-size: 13px;
            font-weight: 700;
            line-height: 1;
        }

        .lb-rank-num.grey   { color: #555; }
        .lb-rank-num.gold   { color: #cb8a19; }
        .lb-rank-num.silver { color: #b0b0b0; }
        .lb-rank-num.bronze { color: #a06428; }

        /* column header row */
        .lb-header {
            display: flex;
            align-items: center;
            padding: 8px 26px 2px;
            gap: 12px;
        }
        .lb-header-rank {
            width: 32px;
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 600;
            color: #555;
            text-align: center;
        }
        .lb-header-user {
            flex: 1;
            font-size: 11px;
            font-weight: 600;
            color: #555;
            padding-left: 56px;
        }

        /* Avatar */
        .lb-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 2px solid rgba(255,255,255,0.08);
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .lb-avatar-letter {
            font-size: 16px;
            font-weight: 700;
            color: #666;
        }

        .lb-name {
            flex: 1;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lb-amount {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── YOUR POSITION — inline ── */
        .lb-my-bar {
            margin: 8px 12px 0;
            background: #0f0f0f;
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 10px 12px;
        }

        .lb-my-label {
            color: #888;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 6px;
            padding-left: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lb-row.mine {
            border: 2px solid #403e3c;
            background: #141414;
            box-shadow: 0 0 12px rgba(119, 80, 17, 0.15);
            margin: 0;
        }

        .lb-rank-num.blue { color: #94928e; font-size: 15px; }

        /* ── NAV BAR ── */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #141414;
            border-top: 0.5px solid #242424;
            border-radius: 20px 20px 0 0;
            padding: 8px 0 max(28px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            flex: 1;
            padding: 4px 0;
            transition: transform 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent !important;
            border: none;
            background: none;
            outline: none !important;
        }

        .nav-item:active { transform: scale(0.88); }

        .icon-wrap {
            width: 40px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            transition: background 0.2s;
            position: relative;
        }

        .nav-item i { font-size: 23px; color: #4a4a4a; transition: color 0.2s; }
        .nav-item span {
            font-size: 10px; color: #4a4a4a;
            font-weight: 400; font-family: "Poppins", sans-serif;
            transition: color 0.2s; white-space: nowrap;
        }

        .nav-item.active .icon-wrap { background: rgba(203,138,25,0.13); }
        .nav-item.active i, .nav-item.active span { color: #cb8a19; }
        .nav-item.active span { font-weight: 600; }

        .nav-item.active .icon-wrap::before {
            content: '';
            position: absolute;
            top: -8px; left: 50%;
            transform: translateX(-50%);
            width: 22px; height: 3px;
            background: #cb8a19;
            border-radius: 0 0 4px 4px;
        }

        .badge {
            position: absolute; top: 1px; right: 1px;
            width: 8px; height: 8px;
            background: #e53935;
            border-radius: 50%;
            border: 1.5px solid #141414;
        }

        .deposit-btn,
        .avatar-wrap,
        .nav-item,
        .tab-btn,
        .lb-row {
            touch-action: manipulation;
        }
    </style>
</head>
<body ontouchstart="">

<!-- TOP BAR (fixed) -->
<div class="topbar">
    <button class="deposit-btn">Пополнить</button>

    <div class="balance-chip">
        <svg class="ton-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="28" cy="28" r="28" fill="#0098EA"/>
            <path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/>
        </svg>
        <span id="balance-amount">0.00</span>
    </div>

    <div class="avatar-wrap" id="user-icon" onclick="window.location.href='blazeGift-profile.html'">
        <div class="avatar-placeholder"><i class="ti ti-user"></i></div>
    </div>
</div>

<!-- spacer for fixed topbar -->
<div class="topbar-spacer"></div>

<!-- PAGE CONTENT -->
<div class="page-content">

    <!-- HERO -->
    <div class="lb-hero">
        <div class="lb-hero-text">
            <div class="lb-hero-title">Лидерборд</div>
            <div class="lb-hero-sub">Зарабатывай и<br>поднимайся в рейтинге!</div>
        </div>
        <div class="lb-trophy-wrap">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Gold_trophy_cup.png/240px-Gold_trophy_cup.png" alt="trophy">
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs-wrap">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('month')">За месяц</button>
            <button class="tab-btn" onclick="switchTab('alltime')">За всё время</button>
        </div>
    </div>

    <!-- LEADERBOARD LIST -->
    <div class="lb-list" id="lb-list"></div>

    <!-- YOUR POSITION (inline at the end) -->
    <div class="lb-my-bar">
        <div class="lb-my-label">Ваша позиция</div>
        <div class="lb-row mine">
            <div class="lb-rank-wrap">
                <span class="lb-rank-num blue" id="my-rank">145</span>
            </div>
            <div class="lb-avatar" id="my-avatar">
                <i class="ti ti-user" style="font-size:20px;color:#555;"></i>
            </div>
            <div class="lb-name" id="my-name">Вы</div>
            <div class="lb-amount">
                <span id="my-amount">215.10</span>
                <svg class="ton-icon-sm" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="28" cy="28" r="28" fill="#0098EA"/>
                    <path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/>
                </svg>
            </div>
        </div>
    </div>

</div>

<!-- NAV BAR -->
<nav class="nav-bar" role="navigation">
    <button class="nav-item" data-page="blazeGift-giveaways.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-gift"></i><span class="badge"></span></div>
        <span>Розыгрыши</span>
    </button>
    <button class="nav-item" data-page="blazeGift-earn.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-coin"></i></div>
        <span>Заработать</span>
    </button>
    <button class="nav-item" data-page="blazeGift-games.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-home"></i></div>
        <span>Игры</span>
    </button>
    <button class="nav-item active" data-page="blazeGift-leaderboard.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-trophy"></i></div>
        <span>Лидерборд</span>
    </button>
    <button class="nav-item" data-page="index.html" onclick="navigate(this)">
        <div class="icon-wrap"><i class="ti ti-user"></i></div>
        <span>Профиль</span>
    </button>
</nav>

<script>
const tg = window.Telegram?.WebApp;
const tgUser = tg?.initDataUnsafe?.user;

const iconEl = document.getElementById('user-icon');

if (tgUser) {
    if (tgUser.photo_url) {
        iconEl.innerHTML = `<img src="${tgUser.photo_url}" alt="avatar">`;
        document.getElementById('my-avatar').innerHTML = `<img src="${tgUser.photo_url}" alt="me">`;
    } else {
        const initials = (tgUser.first_name?.[0] ?? '') + (tgUser.last_name?.[0] ?? '');
        iconEl.innerHTML = `<div class="avatar-initials">${initials}</div>`;
        document.getElementById('my-avatar').innerHTML = `<div class="lb-avatar-letter">${initials}</div>`;
    }
    const displayName = tgUser.username
        ? `@${tgUser.username}`
        : `${tgUser.first_name ?? ''}${tgUser.last_name ? ' ' + tgUser.last_name : ''}`.trim() || 'Вы';
    document.getElementById('my-name').textContent = displayName;
}

// ── Demo data ──
const demoMonth = [
    { name: 'Night',    amount: 1250.50 },
    { name: 'Skils', amount: 980.10  },
    { name: 'Zeniks',  amount: 745.75  },
    { name: 'Tigr',   amount: 510.30  },
    { name: 'Aslan',    amount: 490.00  },
    { name: 'Balenciaga',  amount: 370.30  },
    { name: 'Slider',   amount: 360.00  },
    { name: 'Svin',   amount: 340.00  },
    { name: 'Crepeer', amount: 320.00  },
    { name: 'Blaze',   amount: 298.50  },
];

const demoAll = [
    { name: 'Night',    amount: 9800.00 },
    { name: 'Skils',  amount: 7420.50 },
    { name: 'Zeniks', amount: 6300.10 },
    { name: 'Svin',   amount: 4900.30 },
    { name: 'Aslan', amount: 3870.00 },
    { name: 'Tigr',    amount: 3500.00 },
    { name: 'Crepeer',  amount: 2990.30 },
    { name: 'Balenciaga',   amount: 2740.00 },
    { name: 'Blaze',   amount: 2560.00 },
    { name: 'Slider',   amount: 2310.00 },
];

const tonSVG = `<svg class="ton-icon-sm" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="28" cy="28" r="28" fill="#0098EA"/>
    <path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/>
</svg>`;

const rankMeta = [
    { numCls: 'gold',   trophyCls: 'gold',   rowCls: 'rank-1' },
    { numCls: 'silver', trophyCls: 'silver',  rowCls: 'rank-2' },
    { numCls: 'bronze', trophyCls: 'bronze',  rowCls: 'rank-3' },
];

function renderList(data) {
    const header = `<div class="lb-header">
        <div class="lb-header-rank">№</div>
        <div class="lb-header-user">Пользователь</div>
    </div>`;

    const rows = data.map((entry, i) => {
        const rank = i + 1;
        const meta = i < 3 ? rankMeta[i] : { numCls: 'grey', rowCls: '' };
        const letter = entry.name?.[0]?.toUpperCase() ?? '?';
        const avatarHtml = entry.avatar
            ? `<img src="${entry.avatar}" alt="${entry.name}">`
            : `<div class="lb-avatar-letter">${letter}</div>`;

        return `
        <div class="lb-row ${meta.rowCls}">
            <div class="lb-rank-wrap">
                <span class="lb-rank-num ${meta.numCls}">${rank}.</span>
            </div>
            <div class="lb-avatar">${avatarHtml}</div>
            <div class="lb-name">${entry.name}</div>
            <div class="lb-amount">${entry.amount.toFixed(2)} ${tonSVG}</div>
        </div>`;
    }).join('');

    document.getElementById('lb-list').innerHTML = header + rows;
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'month') || (i === 1 && tab === 'alltime'));
    });
    renderList(tab === 'month' ? demoMonth : demoAll);
}

function navigate(button) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    button.classList.add('active');
    window.location.href = button.dataset.page;
}

document.getElementById('balance-amount').textContent = '0.00';

renderList(demoMonth);

document.addEventListener('touchstart', function(){}, { passive: true });
</script>

</body>
</html>
