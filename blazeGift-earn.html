<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlazeGift.up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none;
        }

        html, body {
            height: 100%;
            background-color: #0a0a0a;
            font-family: "Poppins", sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ── TOPBAR ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: #0a0a0a;
            padding-top: 70px;
        }

        /* ── КНОПКА ПОПОЛНИТЬ ── */
        .deposit-btn {
            background: #cb8a19;
            border: none;
            border-radius: 50px;
            padding: 12px 38px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
            outline: none;
        }

        .deposit-btn:active {
            background: #a57015;
            transform: scale(0.96);
        }

        /* ── БАЛАНС ── */
        .balance-chip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: #1c1c1c;
            border-radius: 50px;
            padding: 10px 14px;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            margin-left: auto;
            flex: 0 0 auto;
        }

        .balance-chip span {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .ton-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* ── АВАТАРКА ── */
        .avatar-wrap {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 2px solid rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }

        .avatar-wrap:active {
            transform: scale(0.92);
            border-color: rgba(255, 255, 255, 0.35);
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-placeholder i {
            font-size: 20px;
            color: #888;
        }

        .avatar-initials {
            font-size: 16px;
            font-weight: 700;
            color: #aaa;
            font-family: "Poppins", sans-serif;
        }

        button, a {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            -webkit-appearance: none;
            appearance: none;
        }

        button:focus, button:active, button:focus-visible {
            outline: none !important;
            box-shadow: none !important;
        }

        /* ── FIX: убираем лишний отступ сверху ── */
        .page-content {
            padding-top: 0;
            padding-bottom: 110px;
            width: 100%;
            margin-top: -5px;
        }

        /* TABS */
        .tabs-wrap { padding: 14px 12px 0; }

        .tabs-container {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 4px;
            display: flex;
            border: 1.5px solid rgba(255,255,255,0.12);
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            font-family: "Poppins", sans-serif;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none;
        }
        .tab-btn.active { background: #2c2c2e; color: #fff; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: #cb8a19;
            border-radius: 2px;
        }

        .panel { display: none; }
        .panel.active { display: block; }

        /* HERO CARD */
        .hero-card {
            margin: 16px 12px 0;
            background: #141414;
            border-radius: 18px;
            border: 1.5px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px 28px;
            gap: 10px;
        }

        .hero-icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #cb8a19;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
        }

        .hero-icon-wrap i { font-size: 36px; color: #fff; }

        .hero-title {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            line-height: 1.2;
        }

        .hero-subtitle {
            color: #888;
            font-size: 14px;
            font-weight: 400;
            text-align: center;
            line-height: 1.5;
        }

        /* TASKS LIST */
        .tasks-section {
            padding: 16px 12px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-card {
            background: #141414;
            border-radius: 16px;
            border: 1.5px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            padding: 14px 14px 14px 16px;
            gap: 14px;
        }

        .task-icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #0098EA;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .task-icon-wrap i { font-size: 22px; color: #fff; }

        .task-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .task-title { color: #fff; font-size: 14px; font-weight: 600; }

        .task-reward {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #888;
            font-size: 12px;
            font-weight: 500;
        }

        .ton-icon-sm { width: 16px; height: 16px; flex-shrink: 0; }

        .task-btn {
            background: #cb8a19;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 14px;
            font-family: "Poppins", sans-serif;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none;
            white-space: nowrap;
        }

        .task-btn:active { background: #a57015; transform: scale(0.96); }
        .task-btn.done {
            background: #1e1e1e;
            color: #555;
            border: 1.5px solid rgba(255,255,255,0.08);
            cursor: default;
        }

        /* REF SECTION */
        .ref-section { padding: 16px 12px 0; display: flex; flex-direction: column; gap: 12px; }

        .ref-hero-card {
            background: #141414;
            border-radius: 18px;
            border: 1.5px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 24px 28px;
            gap: 10px;
        }

        .ref-hero-icon {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: #cb8a19;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 6px;
        }
        .ref-hero-icon i { font-size: 36px; color: #fff; }

        .ref-hero-title {
            color: #fff; font-size: 24px; font-weight: 800;
            text-align: center; line-height: 1.2;
        }
        .ref-hero-sub {
            color: #888; font-size: 14px; font-weight: 400;
            text-align: center; line-height: 1.5;
        }

        .ref-action-row { display: flex; gap: 10px; }

        .ref-invite-btn {
            flex: 1;
            background: #cb8a19;
            color: #fff; border: none;
            border-radius: 14px;
            padding: 16px 0;
            font-size: 16px; font-weight: 700;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none;
        }
        .ref-invite-btn:active { background: #a57015; transform: scale(0.97); }

        .ref-copy-btn {
            width: 56px; height: 56px;
            background: #1c1c1e;
            border: 1.5px solid #cb8a19;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none;
            color: #cb8a19;
        }
        .ref-copy-btn:active { background: #2a2a2a; transform: scale(0.93); }
        .ref-copy-btn i { font-size: 22px; }

        /* Stats card */
        .ref-stats-card {
            background: #141414;
            border-radius: 18px;
            border: 1.5px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .ref-stat-row {
            display: flex; align-items: center;
            padding: 16px 18px;
            gap: 14px;
        }
        .ref-stat-row + .ref-stat-row {
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        /* ── FIX: иконка "Всего заработано" — синяя ── */
        .ref-stat-icon {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #0098EA;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .ref-stat-icon i { font-size: 18px; color: #fff; }

        .ref-stat-label {
            flex: 1; color: #ccc; font-size: 14px; font-weight: 500;
        }

        .ref-stat-val {
            display: flex; align-items: center; gap: 5px;
            color: #fff; font-size: 14px; font-weight: 700;
        }

        /* Referrals list */
        .ref-list-card {
            background: #141414;
            border-radius: 18px;
            border: 1.5px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .ref-user-row {
            display: flex; align-items: center;
            padding: 14px 18px; gap: 12px;
        }
        .ref-user-row + .ref-user-row {
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .ref-user-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1.5px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            color: #555; font-size: 18px;
        }
        .ref-user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .ref-user-name {
            flex: 1; color: #fff; font-size: 14px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .ref-user-val {
            display: flex; align-items: center; gap: 5px;
            color: #fff; font-size: 14px; font-weight: 700; flex-shrink: 0;
        }

        /* NAV BAR */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #141414;
            border-top: 0.5px solid #242424;
            border-radius: 20px 20px 0 0;
            padding: 8px 0 max(28px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            flex: 1;
            padding: 4px 0;
            transition: transform 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent !important;
            border: none;
            background: none;
            outline: none !important;
        }
        .nav-item:active { transform: scale(0.88); }

        .icon-wrap {
            width: 40px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px;
            transition: background 0.2s;
            position: relative;
        }

        .nav-item i { font-size: 23px; color: #4a4a4a; transition: color 0.2s; }
        .nav-item span {
            font-size: 10px; color: #4a4a4a;
            font-weight: 400; font-family: "Poppins", sans-serif;
            transition: color 0.2s; white-space: nowrap;
        }

        .nav-item.active .icon-wrap { background: rgba(203,138,25,0.13); }
        .nav-item.active i, .nav-item.active span { color: #cb8a19; }
        .nav-item.active span { font-weight: 600; }

        .nav-item.active .icon-wrap::before {
            content: '';
            position: absolute;
            top: -8px; left: 50%;
            transform: translateX(-50%);
            width: 22px; height: 3px;
            background: #cb8a19;
            border-radius: 0 0 4px 4px;
        }

        .badge {
            position: absolute; top: 1px; right: 1px;
            width: 8px; height: 8px;
            background: #e53935;
            border-radius: 50%;
            border: 1.5px solid #141414;
        }
    </style>
</head>
<body>

  <div class="topbar">
    <button class="deposit-btn">Пополнить</button>

    <div class="balance-chip">
        <svg class="ton-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="28" cy="28" r="28" fill="#0098EA"/>
            <path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/>
        </svg>
        <span id="balance-amount">0.00</span>
    </div>

    <div class="avatar-wrap" id="user-icon" onclick="window.location.href='blazeGift-profile.html'">
        <div class="avatar-placeholder"><i class="ti ti-user"></i></div>
    </div>
  </div>


<div class="page-content">

    <div class="tabs-wrap">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('ref')">Реф. система</button>
            <button class="tab-btn" onclick="switchTab('tasks')">Задания</button>
        </div>
    </div>

    <!-- TASKS -->
    <div id="tab-tasks" class="panel">
        <div class="hero-card">
            <div class="hero-icon-wrap">
                <i class="ti ti-clipboard-list"></i>
            </div>
            <div class="hero-title">Выполняй задания</div>
            <div class="hero-subtitle">И получай за это хорошие награды</div>
        </div>

        <div class="tasks-section">
            <div class="task-card">
                <div class="task-icon-wrap">
                    <i class="ti ti-brand-telegram"></i>
                </div>
                <div class="task-info">
                    <div class="task-title">Подпишись на нас</div>
                    <div class="task-reward">
                        Награда: <svg class="ton-icon-sm" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="28" fill="#0098EA"/><path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/></svg> 0.00
                    </div>
                </div>
                <button class="task-btn" onclick="doTask(this,'https://t.me/blazegift')">Начать</button>
            </div>

            <div class="task-card">
                <div class="task-icon-wrap" style="background:#0098EA;">
                    <i class="ti ti-brand-telegram"></i>
                </div>
                <div class="task-info">
                    <div class="task-title">Подпишись на нас</div>
                    <div class="task-reward">
                        Награда: <svg class="ton-icon-sm" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="28" fill="#0098EA"/><path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/></svg> 0.00
                    </div>
                </div>
                <button class="task-btn" onclick="doTask(this,'https://t.me/blazegift_news')">Начать</button>
            </div>

            <div class="task-card">
                <div class="task-icon-wrap" style="background:#0098EA;">
                    <i class="ti ti-brand-telegram"></i>
                </div>
                <div class="task-info">
                    <div class="task-title">Подпишись на нас</div>
                    <div class="task-reward">
                        Награда: <svg class="ton-icon-sm" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="28" r="28" fill="#0098EA"/><path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/></svg> 0.00
                    </div>
                </div>
                <button class="task-btn" onclick="doTask(this,'https://t.me/blazegift')">Начать</button>
            </div>
        </div>
    </div>

    <!-- REF -->
    <div id="tab-ref" class="panel active">
        <div class="ref-section">

            <div class="ref-hero-card">
                <div class="ref-hero-icon">
                    <i class="ti ti-users"></i>
                </div>
                <div class="ref-hero-title">Приглашай друзей</div>
                <div class="ref-hero-sub">И получай 10% от их депозитов на свой баланс</div>
            </div>

            <div class="ref-action-row">
                <button class="ref-invite-btn" id="inviteBtn">Пригласить</button>
                <button class="ref-copy-btn" id="copyBtn" title="Скопировать ссылку">
                    <i class="ti ti-copy"></i>
                </button>
            </div>

            <div class="ref-stats-card">
                <div class="ref-stat-row">
                    <div class="ref-stat-icon"><i class="ti ti-users"></i></div>
                    <div class="ref-stat-label">Мои рефералы</div>
                    <div class="ref-stat-val" id="refCount">0</div>
                </div>
                <div class="ref-stat-row">
                    <!-- FIX: синяя иконка TON вместо оранжевой -->
                    <div class="ref-stat-icon">
                        <svg style="width:18px;height:18px;" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M37.5603 15.6277H18.4386C14.9228 15.6277 12.6928 19.4202 14.4603 22.4797L26.6457 43.9782C27.3139 45.1302 28.9937 45.1302 29.6547 43.9782L41.8474 22.4797C43.6149 19.4202 41.378 15.6277 37.5603 15.6277ZM26.2098 39.1811L23.9798 34.7511L17.1447 22.4797C16.8861 22.0271 17.2121 21.4534 17.7367 21.4534H26.2098V39.1811ZM38.8409 22.4797L32.0131 34.7511L29.7831 39.1811V21.4534H38.2561C38.7808 21.4534 39.1068 22.0271 38.8482 22.4797H38.8409Z" fill="white"/>
                        </svg>
                    </div>
                    <div class="ref-stat-label">Всего заработано</div>

<script>
const tg = window.Telegram?.WebApp;
const tgUser = tg?.initDataUnsafe?.user;
const iconEl = document.getElementById('user-icon');

if (tgUser) {
    if (tgUser.photo_url) {
        iconEl.innerHTML = `<img src="${tgUser.photo_url}" alt="avatar">`;
    } else {
        const initials = (tgUser.first_name?.[0] ?? '') + (tgUser.last_name?.[0] ?? '');
        iconEl.innerHTML = `<div class="avatar-initials">${initials}</div>`;
    }
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && tab === 'ref') || (i === 1 && tab === 'tasks'));
    });
    document.getElementById('tab-tasks').classList.toggle('active', tab === 'tasks');
    document.getElementById('tab-ref').classList.toggle('active', tab === 'ref');
}

function doTask(btn, url) {
    if (btn.classList.contains('done')) return;
    window.open(url, '_blank');
    setTimeout(() => {
        btn.classList.add('done');
        btn.textContent = 'Готово ✓';
        btn.setAttribute('disabled', true);
    }, 1500);
}

function navigate(button) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    button.classList.add('active');
    window.location.href = button.dataset.page;
}

document.getElementById('copyBtn').addEventListener('click', function() {
    const tg = window.Telegram?.WebApp;
    const userId = tg?.initDataUnsafe?.user?.id ?? '0';
    const link = 'https://t.me/blazegiftbot?start=' + userId;
    navigator.clipboard?.writeText(link).catch(() => {});
    const icon = this.querySelector('i');
    icon.className = 'ti ti-check';
    setTimeout(() => icon.className = 'ti ti-copy', 2000);
});

document.getElementById('inviteBtn').addEventListener('click', function() {
    const tg = window.Telegram?.WebApp;
    const userId = tg?.initDataUnsafe?.user?.id ?? '0';
    const link = 'https://t.me/blazegiftbot?start=' + userId;
    const text = encodeURIComponent('Заходи в BlazeGift и получай NFT-подарки! 🎁');
    if (tg) {
        tg.openTelegramLink('https://t.me/share/url?url=' + encodeURIComponent(link) + '&text=' + text);
    } else {
        window.open('https://t.me/share/url?url=' + encodeURIComponent(link) + '&text=' + text, '_blank');
    }
});
</script>
